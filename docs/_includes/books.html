{% if site.data.books.books %}
<section class="list">
    <div class="books-grid">
        {% for book_hash in site.data.books.books-list %}
        {% assign book = book_hash[1] %}
            <div class="book-item">
                <a class="book-link" href="{{ book.url }}" target="_blank" rel="noopener">
                    <img class="book-cover" src="{{ book.cover }}" alt="{{ book.title }} book cover">
                    <h3 class="book-title">{{ book.title }}</h3>
                </a>
                {% if book.description %}
                <p class="book-description">{{ book.description }}</p>
                {% endif %}
            </div>
        {% endfor %}
    </div>
</section>
{% endif %}
